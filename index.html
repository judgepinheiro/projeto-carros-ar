<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello WebXR</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>WebXR Hello World</h3>
        <p>Clique em "START AR" para começar</p>
    </div>

    <script type="module">
        // Importar THREE.js localmente
        import * as THREE from './libs/three.module.js';
        import { ARButton } from './libs/ARButton.js';

        let camera, scene, renderer;
        let controller;

        init();
        animate();

        function init() {
            // Container
            const container = document.createElement('div');
            document.body.appendChild(container);

            // Cena
            scene = new THREE.Scene();

            // Câmera
            camera = new THREE.PerspectiveCamera(
                70,
                window.innerWidth / window.innerHeight,
                0.01,
                20
            );

            // Luz
            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            light.position.set(0.5, 1, 0.25);
            scene.add(light);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.dpr);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            // Botão AR
            document.body.appendChild(
                ARButton.createButton(renderer, {
                    requiredFeatures: ['hit-test']
                })
            );

            // Criar um cubo de exemplo
            const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const material = new THREE.MeshPhongMaterial({
                color: 0x00ff00,
                shininess: 100
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, 0, -0.5);
            scene.add(cube);

            // Controller para interação
            controller = renderer.xr.getController(0);
            controller.addEventListener('select', onSelect);
            scene.add(controller);

            // Redimensionar
            window.addEventListener('resize', onWindowResize);
        }

        function onSelect() {
            // Adicionar um cubo na posição do controller
            const geometry = new THREE.BoxGeometry(0.05, 0.05, 0.05);
            const material = new THREE.MeshPhongMaterial({
                color: Math.random() * 0xffffff
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(controller.position);
            scene.add(mesh);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
