<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <title>AR Carros</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    body { margin:0; overflow:hidden; }

    #controls {
      display: none;
      position: fixed;
      z-index: 999;
      bottom: 20px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 10px;
      font-family: Arial;
    }

    #controls.visible { display: block; }

    .cor-btn {
      display: inline-block;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      margin: 5px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .cor-btn:hover {
      transform: scale(1.2);
    }

    #loading {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      color:white;
      z-index:9999;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      font-family:Arial;
    }

    #loading-bar-container {
      width:200px;
      height:10px;
      background:#444;
      margin-top:10px;
      border-radius:5px;
      overflow:hidden;
    }

    #loading-bar {
      width:0%;
      height:100%;
      background:lime;
    }
  </style>
</head>

<body>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

  <a-assets>
    <a-asset-item id="bmw3_preto" src="./bmw3_preto.glb"></a-asset-item>
    <a-asset-item id="bmw3_prata" src="./bmw3_prata.glb"></a-asset-item>
    <a-asset-item id="bmw3_vermelho" src="./bmw3_vermelho.glb"></a-asset-item>

    <a-asset-item id="x5_preto" src="./x5_preto.glb"></a-asset-item>
    <a-asset-item id="x5_prata" src="./x5_prata.glb"></a-asset-item>
    <a-asset-item id="x5_branco" src="./x5_branco.glb"></a-asset-item>

    <a-asset-item id="palio_preto" src="./palio_preto.glb"></a-asset-item>
    <a-asset-item id="palio_prata" src="./palio_prata.glb"></a-asset-item>
    <a-asset-item id="palio_vermelho" src="./palio_vermelho.glb"></a-asset-item>

    <a-asset-item id="uno_preto" src="./uno_preto.glb"></a-asset-item>
    <a-asset-item id="uno_prata" src="./uno_prata.glb"></a-asset-item>
    <a-asset-item id="uno_branco" src="./uno_branco.glb"></a-asset-item>
  </a-assets>

  <a-marker type="pattern" url="./pattern-letterA.patt">
    <a-entity id="model1" gltf-model="#bmw3_preto" rotation="-90 0 0"></a-entity>
  </a-marker>

  <a-marker type="pattern" url="./pattern-letterB.patt">
    <a-entity id="model2" gltf-model="#x5_preto" rotation="-90 0 0"></a-entity>
  </a-marker>

  <a-marker type="pattern" url="./pattern-letterC.patt">
    <a-entity id="model3" gltf-model="#palio_preto" rotation="-90 0 0"></a-entity>
  </a-marker>

  <a-marker type="pattern" url="./pattern-letterD.patt">
    <a-entity id="model4" gltf-model="#uno_preto" rotation="-90 0 0"></a-entity>
  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<div id="controls">
  <div id="active-marker-label">—</div>

  <div>
    <strong>Cores:</strong><br>
    <span id="btn_preto" class="cor-btn" style="background:black;" onclick="trocarCor('preto')"></span>
    <span id="btn_prata" class="cor-btn" style="background:silver;" onclick="trocarCor('prata')"></span>
    <span id="btn_vermelho" class="cor-btn" style="background:red;" onclick="trocarCor('vermelho')"></span>
    <span id="btn_branco" class="cor-btn" style="background:white; border:1px solid #000;" onclick="trocarCor('branco')"></span>
  </div>

  <hr>

  <div>
    Escala:
    <button onclick="changeScale(-0.1)">−</button>
    <button onclick="changeScale(0.1)">+</button>
  </div>

  <div>
    X:
    <button onclick="changePos('x', -0.1)">−</button>
    <button onclick="changePos('x', 0.1)">+</button>
  </div>

  <div>
    Y:
    <button onclick="changePos('y', -0.1)">−</button>
    <button onclick="changePos('y', 0.1)">+</button>
  </div>

  <div>
    Z:
    <button onclick="changePos('z', -0.1)">−</button>
    <button onclick="changePos('z', 0.1)">+</button>
  </div>

  <div>
    Rot X:
    <button onclick="changeRot('x', -15)">−</button>
    <button onclick="changeRot('x', 15)">+</button>
  </div>

  <div>
    Rot Y:
    <button onclick="changeRot('y', -15)">−</button>
    <button onclick="changeRot('y', 15)">+</button>
  </div>

  <div>
    Rot Z:
    <button onclick="changeRot('z', -15)">−</button>
    <button onclick="changeRot('z', 15)">+</button>
  </div>
</div>

<div id="loading">
  <div>Carregando modelo...</div>
  <div id="loading-bar-container">
    <div id="loading-bar"></div>
  </div>
</div>

<script>

const controls = document.getElementById('controls');
const activeMarkerLabel = document.getElementById('active-marker-label');

const markerConfig = [
  {
    name: 'BMW Série 3',
    el: document.querySelector('[url="./pattern-letterA.patt"]'),
    model: document.getElementById('model1'),
    base: 'bmw3',
    cores: ['preto', 'prata', 'vermelho'],
    state: { scale: 1, pos: {x:0,y:0,z:0}, rot: {x:-90,y:0,z:0} }
  },
  {
    name: 'BMW X5',
    el: document.querySelector('[url="./pattern-letterB.patt"]'),
    model: document.getElementById('model2'),
    base: 'x5',
    cores: ['preto', 'prata', 'branco'],
    state: { scale: 1, pos: {x:0,y:0,z:0}, rot: {x:-90,y:0,z:0} }
  },
  {
    name: 'Fiat Palio',
    el: document.querySelector('[url="./pattern-letterC.patt"]'),
    model: document.getElementById('model3'),
    base: 'palio',
    cores: ['preto', 'prata', 'vermelho'],
    state: { scale: 1, pos: {x:0,y:0,z:0}, rot: {x:-90,y:0,z:0} }
  },
  {
    name: 'Fiat Uno',
    el: document.querySelector('[url="./pattern-letterD.patt"]'),
    model: document.getElementById('model4'),
    base: 'uno',
    cores: ['preto', 'prata', 'branco'],
    state: { scale: 1, pos: {x:0,y:0,z:0}, rot: {x:-90,y:0,z:0} }
  }
];

let activeMarker = null;

markerConfig.forEach(m => {
  m.el.addEventListener('markerFound', () => {
    activeMarker = m;
    activeMarkerLabel.textContent = `Carro ativo: ${m.name}`;
    controls.classList.add('visible');
  });

  m.el.addEventListener('markerLost', () => {
    if (activeMarker === m) {
      activeMarker = null;
      controls.classList.remove('visible');
    }
  });
});

function trocarCor(cor) {
  if (!activeMarker) return;
  if (!activeMarker.cores.includes(cor)) return;

  const modelo = `#${activeMarker.base}_${cor}`;
  const loading = document.getElementById("loading");
  const bar = document.getElementById("loading-bar");

  loading.style.display = "flex";
  bar.style.width = "10%";

  const entity = activeMarker.model;

  entity.addEventListener('model-loaded', function handler() {
    bar.style.width = "100%";
    setTimeout(() => loading.style.display = "none", 300);
    entity.removeEventListener('model-loaded', handler);
  });

  entity.setAttribute('gltf-model', modelo);
}

function changeScale(delta) {
  if (!activeMarker) return;
  const s = activeMarker.state;
  s.scale = Math.max(0.1, s.scale + delta);
  activeMarker.model.setAttribute('scale', `${s.scale} ${s.scale} ${s.scale}`);
}

function changePos(axis, delta) {
  if (!activeMarker) return;
  const p = activeMarker.state.pos;
  p[axis] += delta;
  activeMarker.model.setAttribute('position', `${p.x} ${p.y} ${p.z}`);
}

function changeRot(axis, delta) {
  if (!activeMarker) return;
  const r = activeMarker.state.rot;
  r[axis] += delta;
  activeMarker.model.setAttribute('rotation', `${r.x} ${r.y} ${r.z}`);
}

</script>

</body>
</html>
